<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Struk Pembayaran - Antheng Coffee</title>
    <style>
        body { background: #eee; font-family: 'Courier New', Courier, monospace; display: flex; justify-content: center; padding: 20px; }
        .resi-card { background: white; width: 300px; padding: 20px; box-shadow: 0 0 10px rgba(0,0,0,0.1); color: black; }
        .center { text-align: center; }
        hr { border: none; border-top: 1px dashed #000; }
        .flex { display: flex; justify-content: space-between; margin: 5px 0; }
        .btn-area { position: fixed; bottom: 20px; display: flex; gap: 10px; }
        button { padding: 10px 20px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; }
        @media print { .btn-area { display: none; } body { background: white; padding: 0; } .resi-card { box-shadow: none; width: 100%; } }
    </style>
</head>
<body>
    <div class="resi-card" id="isi-resi">
        </div>

    <div class="btn-area">
        <button onclick="window.location.href='index.html'" style="background:#555; color:white;">KEMBALI</button>
        <button onclick="window.print()" style="background:#d4af37; color:black;">CETAK / JPG</button>
    </div>

    <script src="resiScript.js"></script>
</body>
</html>
