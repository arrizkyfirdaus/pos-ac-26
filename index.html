<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <title>Caffe-POS Pro</title>
</head>
<body>
    <header>
        <h1>Caffe-POS Pro</h1>
    </header>

    <main>
        <section id="menu-section">
            <h3>Menu Kafe</h3>
            <div id="menu-grid"></div>
        </section>

        <section id="checkout-section">
            <h3>Keranjang</h3>
            <div id="cart-items"></div>
            
            <div class="billing-area">
                <div class="bill-line">
                    <strong>Total:</strong>
                    <strong>Rp <span id="total-harga">0</span></strong>
                </div>
                <div class="bill-line">
                    <label>Bayar:</label>
                    <input type="number" id="input-bayar" placeholder="0" oninput="hitungKembalian()">
                </div>
                <div class="bill-line">
                    <span>Kembali:</span>
                    <span id="text-kembalian">0</span>
                </div>
                <button id="btn-checkout" onclick="checkout()">SIMPAN & CETAK RESI</button>
            </div>

            <hr>
            <h3>Riwayat 5 Terakhir</h3>
            <div id="history-list"></div>
        </section>
    </main>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
