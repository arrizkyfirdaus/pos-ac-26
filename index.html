<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <title>Antheng Coffee - Kasir</title>
</head>
<body class="dark-mode">
    <div class="app-container">
        <header>
            <h2 class="gold">Antheng Coffee</h2>
        </header>

        <section class="card">
            <input type="text" id="nama-pelanggan" placeholder="Nama Pelanggan">
            <div class="row">
                <select id="select-menu">
                    <option value="">Pilih Menu</option>
                </select>
                <input type="number" id="qty" value="1" min="1">
                <button onclick="tambahItem()" class="btn-gold">+</button>
            </div>
        </section>

        <div id="list-pesanan" class="scroll-area">
            </div>

        <div class="payment-bar">
            <input type="number" id="tunai" placeholder="Uang Tunai (Rp)" oninput="kalkulasi()">
            <div class="info">
                <p>Total: <span id="total-txt" class="gold">Rp0</span></p>
                <p>Kembali: <span id="kembali-txt" class="gold">Rp0</span></p>
            </div>
            <button onclick="prosesTransaksi()" class="btn-confirm">SIMPAN & CETAK</button>
        </div>

        <nav class="bottom-nav">
            <a href="index.html" class="active">🛒 Kasir</a>
            <a href="riwayat.html">📜 Riwayat</a>
            <a href="admin.html">⚙️ Admin</a>
        </nav>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
