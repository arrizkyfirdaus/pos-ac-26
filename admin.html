<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Admin Dashboard - Antheng Coffee</title>
</head>
<body class="qasir-layout">
    <nav class="side-nav">
        <div class="logo">AC</div>
        <a href="index.html">🛒</a>
        <a href="riwayat.html">📜</a>
        <a href="admin.html" class="active">📊</a>
    </nav>

    <main class="main-content">
        <div style="width: 100%;">
            <header style="margin-bottom: 25px;">
                <h2 class="gold">Laporan & Manajemen</h2>
                <p style="color: #636e72; font-size: 14px;">Pantau performa Antheng Coffee hari ini</p>
            </header>

            <section class="stats-grid">
                <div class="stat-box">
                    <small>Total Omzet</small>
                    <p id="stat-omzet" class="gold">Rp0</p>
                </div>
                <div class="stat-box">
                    <small>Pengeluaran</small>
                    <p id="stat-total-keluar" style="color: #ff7675;">Rp0</p>
                </div>
                <div class="stat-box">
                    <small>Laba Bersih</small>
                    <p id="stat-laba" style="color: #55efc4;">Rp0</p>
                </div>
                <div class="stat-box">
                    <small>Transaksi</small>
                    <p id="stat-count">0</p>
                </div>
            </section>

            <div class="admin-grid-layout">
                <div class="admin-card">
                    <div class="card-header">
                        <h3>📦 Kelola Daftar Menu</h3>
                        <span class="badge-count" id="menu-count">0 Menu</span>
                    </div>
                    <div class="form-group">
                        <input type="text" id="m-nama" placeholder="Nama Menu (misal: Es Kopi Susu)">
                        <input type="number" id="m-harga" placeholder="Harga Jual (Rp)">
                        <button onclick="tambahMenu()" class="btn-primary">＋ TAMBAH MENU</button>
                    </div>
                    <div class="list-container" id="admin-menu-list">
                        </div>
                </div>

                <div class="admin-card">
                    <div class="card-header">
                        <h3>💸 Catat Pengeluaran</h3>
                    </div>
                    <div class="form-group">
                        <input type="text" id="ket-pengeluaran" placeholder="Keterangan (misal: Beli Gas)">
                        <input type="number" id="nom-pengeluaran" placeholder="Nominal (Rp)">
                        <button onclick="simpanPengeluaran()" class="btn-danger-outline">CATAT PENGELUARAN</button>
                    </div>
                    <div class="list-container" id="list-pengeluaran">
                        </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <script src="adminScript.js"></script>
</body>
</html>
