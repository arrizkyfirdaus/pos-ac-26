<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style.css">
    <title>Admin Dashboard - Antheng Coffee</title>
</head>
<body class="dark-mode">
    <div class="app-container" style="padding-bottom: 100px;">
        <header>
            <h2 class="gold">Admin Dashboard</h2>
        </header>

        <section class="stats-grid">
            <div class="stat-box">
                <small>Omzet (Hari Ini)</small>
                <p id="stat-omzet">Rp0</p>
            </div>
            <div class="stat-box">
                <small>Estimasi Laba</small>
                <p id="stat-laba" class="gold">Rp0</p>
            </div>
        </section>

        <section class="card">
            <h3 class="gold" style="margin-top:0;">Shift & Pengeluaran</h3>
            <input type="number" id="saldo-awal" placeholder="Saldo Awal Kasir (Modal)">
            <input type="number" id="pengeluaran" placeholder="Total Pengeluaran Hari Ini">
            <button onclick="hitungLaba()" class="btn-gold" style="width:100%;">UPDATE LABA</button>
        </section>

        <section class="card">
            <h3 class="gold" style="margin-top:0;">🔥 Menu Terlaris</h3>
            <div id="best-seller-list">
                <p style="color:#888; font-size:12px;">Menghitung data...</p>
            </div>
        </section>

        <section class="card">
            <h3 class="gold" style="margin-top:0;">Tambah/Update Menu</h3>
            <input type="text" id="m-nama" placeholder="Nama Menu Baru">
            <input type="number" id="m-harga" placeholder="Harga Jual">
            <button onclick="tambahMenu()" class="btn-confirm">SIMPAN MENU BARU</button>
            
            <div id="admin-menu-list" class="scroll-area" style="margin-top:15px; max-height:200px;">
                </div>
        </section>

        <nav class="bottom-nav">
            <a href="index.html">🛒 Kasir</a>
            <a href="riwayat.html">📜 Riwayat</a>
            <a href="admin.html" class="active">⚙️ Admin</a>
        </nav>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <script src="adminScript.js"></script>
</body>
</html>
